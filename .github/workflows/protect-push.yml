name: Protect Push

on:
  push:

jobs:
  check-author:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if push is from authorized author
        run: |
          if [ "${{ github.actor }}" != "nshportun" ]; then
            echo "Unauthorized push detected from ${{ github.actor }}"
            echo "::error::Unauthorized push detected from ${{ github.actor }}"
            exit 1
          else
            echo "Authorized push from ${{ github.actor }}"
            echo "Push is authorized. No action needed."
          fi
